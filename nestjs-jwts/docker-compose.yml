version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nestjs-postgres-dev
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass12345 # must be a string
      POSTGRES_DB: jwt_db
